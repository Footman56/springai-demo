<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #343541;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background-color: #2a2b32;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3e3f4a;
        }

        .header h1 {
            color: #ececf1;
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-secondary {
            background-color: #3e3f4a;
            color: #ececf1;
        }

        .btn-secondary:hover {
            background-color: #4e4f5a;
        }

        /* 对话容器 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 消息样式 */
        .message {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .message.user {
            background-color: #343541;
        }

        .message.assistant {
            background-color: #343541;
        }

        .message-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .message-icon {
            background-color: #5436da;
            color: white;
        }

        .message.assistant .message-icon {
            background-color: #19c37d;
            color: white;
        }

        .message-content {
            flex: 1;
            color: #ececf1;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-content p {
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        /* 输入区域 */
        .input-container {
            background-color: #343541;
            padding: 20px;
            border-top: 1px solid #3e3f4a;
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        .input-box {
            width: 100%;
            background-color: #40414f;
            border: 1px solid #3e3f4a;
            border-radius: 12px;
            padding: 16px 50px 16px 16px;
            color: #ececf1;
            font-size: 16px;
            resize: none;
            min-height: 56px;
            max-height: 200px;
            line-height: 1.5;
        }

        .input-box:focus {
            outline: none;
            border-color: #19c37d;
        }

        .input-box::placeholder {
            color: #8e8ea0;
        }

        .send-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background-color: #19c37d;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background-color: #18b36e;
        }

        .send-btn:disabled {
            background-color: #3e3f4a;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8e8ea0;
            font-size: 14px;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background-color: #8e8ea0;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        /* 空状态 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8e8ea0;
            padding: 40px;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #ececf1;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .message {
                padding: 12px 0;
            }

            .message-icon {
                width: 28px;
                height: 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <h1>AI 记忆助手</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="clearSession()">新建对话</button>
        </div>
    </div>

    <!-- 对话区域 -->
    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <h2>你好，我是 AI 助手</h2>
            <p>有什么我可以帮你的吗？你可以告诉我你的偏好和习惯，我会记住它们。</p>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-container">
        <div class="input-wrapper">
            <textarea
                class="input-box"
                id="messageInput"
                placeholder="发送消息..."
                rows="1"
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // 状态
        let sessionId = localStorage.getItem('chatSessionId') || '';
        let isLoading = false;
        let messageCount = 0;

        // 获取 sessionId，确保返回有效值
        function getSessionId() {
            if (!sessionId) {
                sessionId = localStorage.getItem('chatSessionId') || '';
            }
            return sessionId;
        }

        // 设置 sessionId
        function setSessionId(newSessionId) {
            if (newSessionId && !sessionId) {
                sessionId = newSessionId;
                localStorage.setItem('chatSessionId', sessionId);
            }
        }

        // DOM 元素
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');

        // 自动调整输入框高度
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // 回车发送
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // 显示用户消息
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // 显示加载状态
            showLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sessionId: getSessionId(),
                        message: message
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 保存 sessionId
                    setSessionId(data.sessionId);

                    // 移除加载状态，显示助手回复
                    removeLoading();
                    addMessage(data.response, 'assistant');
                } else {
                    removeLoading();
                    addMessage('抱歉，发生了错误: ' + (data.error || '未知错误'), 'assistant');
                }
            } catch (error) {
                removeLoading();
                addMessage('网络错误，请稍后重试', 'assistant');
            }
        }

        // 添加消息到界面
        function addMessage(content, role) {
            // 隐藏空状态
            if (emptyState) {
                emptyState.style.display = 'none';
            }

            messageCount++;

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-icon">
                    ${role === 'user' ? '👤' : '🤖'}
                </div>
                <div class="message-content">
                    ${formatMessage(content)}
                </div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 格式化消息（支持换行）
        function formatMessage(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        // 显示加载状态
        function showLoading() {
            isLoading = true;
            sendBtn.disabled = true;

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = `
                <div class="message-icon">🤖</div>
                <div class="message-content">
                    <div class="loading">
                        <div class="loading-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <span>AI 正在思考...</span>
                    </div>
                </div>
            `;

            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 移除加载状态
        function removeLoading() {
            isLoading = false;
            sendBtn.disabled = false;

            const loadingElement = document.getElementById('loadingMessage');
            if (loadingElement) {
                loadingElement.remove();
            }
        }

        // 清除会话
        function clearSession() {
            const currentSessionId = getSessionId();
            if (currentSessionId) {
                fetch(`/api/chat/session/${currentSessionId}`, {
                    method: 'DELETE'
                });
            }

            sessionId = '';
            localStorage.removeItem('chatSessionId');
            messageCount = 0;

            // 清空界面
            chatContainer.innerHTML = '';
            chatContainer.appendChild(emptyState);
            emptyState.style.display = 'flex';
        }

        // 初始化
        const initialSessionId = getSessionId();
        if (initialSessionId) {
            // 加载历史消息
            loadHistory();
        }

        async function loadHistory() {
            const sid = getSessionId();
            if (!sid) return;

            try {
                const response = await fetch(`/api/chat/history/${sid}`);
                const data = await response.json();

                if (data.success && data.history && data.history.length > 0) {
                    // 清空界面
                    chatContainer.innerHTML = '';

                    // 逐条显示历史消息
                    for (let i = 0; i < data.history.length; i++) {
                        const isUser = i % 2 === 0;
                        addMessage(data.history[i], isUser ? 'user' : 'assistant');
                    }
                }
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }
    </script>
</body>
</html>
